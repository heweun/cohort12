name: Merge all non-conflicting PRs at 23:00 KST

on:
  schedule:
    - cron: "0 14 * * *" # KST 23:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge non-conflicting PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --state open --json number,mergeable --jq '.[] | select(.mergeable==true) | .number')
          for pr in $prs; do
            gh pr merge $pr --squash --admin
          done
